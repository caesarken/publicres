<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标准军棋棋盘</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e8e0d5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .board-wrapper {
            background: #f5e6d3;
            padding: 16px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25), inset 0 0 60px rgba(139,90,43,0.08);
            border: 2px solid #c4a574;
            position: relative;
        }
        canvas { display: block; cursor: pointer; }
        .info {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #8b6914;
            font-family: "Microsoft YaHei", sans-serif;
        }
    </style>
</head>
<body>
    <div class="board-wrapper">
        <canvas id="board" width="700" height="1050"></canvas>
        <div class="info">点击落子点查看可移动位置 — 橙色:铁路 绿色:公路</div>
    </div>

    <script>
    (function() {
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');

        // ==================== 常量 ====================
        const DX = 95, DY = 68;
        const OX = 120, OY = 125;
        const ROWS = 13, COLS = 5;

        function pos(c, r) {
            return { x: OX + (c - 1) * DX, y: OY + (r - 1) * DY };
        }

        // ==================== 点位类型 ====================
        function getType(c, r) {
            if ((r === 1 || r === 13) && (c === 2 || c === 4)) return 'Base';
            if ((r === 3 || r === 5 || r === 9 || r === 11) && (c === 2 || c === 4)) return 'CommandPost';
            if ((r === 4 || r === 10) && c === 3) return 'CommandPost';
            if (r === 7 && c % 2 === 1) return 'FrontLine';
            if (r === 7 && c % 2 === 0) return 'Mountain';
            return 'Depot';
        }

        function getTeam(r) {
            if (r <= 6) return 'red';
            if (r >= 8) return 'blue';
            return 'none';
        }

        function onRailway(c, r) {
            if ((c === 1 || c === 5) && r >= 2 && r <= 12) return true;
            if ((r === 2 || r === 6 || r === 8 || r === 12) && c >= 1 && c <= 5) return true;
            if (c === 3 && r >= 6 && r <= 8) return true;
            return false;
        }

        // ==================== 构建数据 ====================
        const pointMap = {};
        for (let r = 1; r <= ROWS; r++) {
            for (let c = 1; c <= COLS; c++) {
                pointMap[`${c},${r}`] = {
                    c, r,
                    type: getType(c, r),
                    team: getTeam(r),
                    onrailway: onRailway(c, r),
                    railway: [],
                    road: []
                };
            }
        }

        function get8n(c, r) {
            const n = [];
            for (let dc = -1; dc <= 1; dc++) {
                for (let dr = -1; dr <= 1; dr++) {
                    if (dc === 0 && dr === 0) continue;
                    const nc = c + dc, nr = r + dr;
                    if (nc >= 1 && nc <= 5 && nr >= 1 && nr <= 13) n.push([nc, nr]);
                }
            }
            return n;
        }

        function get4n(c, r) {
            return [[c,r-1],[c,r+1],[c-1,r],[c+1,r]].filter(([nc,nr])=>nc>=1&&nc<=5&&nr>=1&&nr<=13);
        }

        function addRoad(c1, r1, c2, r2) {
            const p1 = pointMap[`${c1},${r1}`];
            const p2 = pointMap[`${c2},${r2}`];
            if (!p1 || !p2) return;
            const k1 = `${c2},${r2}`, k2 = `${c1},${r1}`;
            if (!p1.road.includes(k1)) p1.road.push(k1);
            if (!p2.road.includes(k2)) p2.road.push(k2);
        }

        // 大本营公路
        addRoad(2,1,1,1); addRoad(2,1,2,2); addRoad(2,1,3,1);
        addRoad(4,1,5,1); addRoad(4,1,4,2); addRoad(4,1,3,1);
        addRoad(2,13,1,13); addRoad(2,13,2,12); addRoad(2,13,3,13);
        addRoad(4,13,5,13); addRoad(4,13,4,12); addRoad(4,13,3,13);

        // 额外兵站公路
        addRoad(3,1,3,2); addRoad(5,1,5,2);
        addRoad(1,13,1,12); addRoad(3,13,3,12); addRoad(5,13,5,12);
        addRoad(2,4,1,4); addRoad(2,4,3,4);
        addRoad(3,3,3,2); addRoad(3,3,3,4);
        addRoad(3,5,3,4); addRoad(3,5,3,6);
        addRoad(4,4,3,4); addRoad(4,4,5,4);
        addRoad(2,10,1,10); addRoad(2,10,3,10);
        addRoad(4,10,3,10); addRoad(4,10,5,10);
        addRoad(3,9,3,8); addRoad(3,9,3,10);
        addRoad(3,11,3,10); addRoad(3,11,3,12);

        // 特殊公路连接
        addRoad(3,3,2,3);
        get8n(3,4).forEach(([nc,nr]) => addRoad(3,4,nc,nr));
        get8n(3,10).forEach(([nc,nr]) => addRoad(3,10,nc,nr));

        // 行营到周围兵站（8方向）
        function addCampRoads(c, r) {
            get8n(c, r).forEach(([nc, nr]) => {
                const np = pointMap[`${nc},${nr}`];
                if (np && np.type === 'Depot') addRoad(c, r, nc, nr);
            });
        }
        [ [2,3],[4,3],[3,4],[2,5],[4,5],[2,9],[4,9],[3,10],[2,11],[4,11] ].forEach(([c,r])=>addCampRoads(c,r));

        // 兵站/前线默认4方向公路
        for (let r = 1; r <= ROWS; r++) {
            for (let c = 1; c <= COLS; c++) {
                const p = pointMap[`${c},${r}`];
                if (p.type === 'Depot' || p.type === 'FrontLine') {
                    get4n(c, r).forEach(([nc, nr]) => {
                        const np = pointMap[`${nc},${nr}`];
                        if (np && np.type !== 'Mountain' && np.type !== 'Base') {
                            addRoad(c, r, nc, nr);
                        }
                    });
                }
            }
        }

        // 铁路线
        const railLines = [
            [[1,2],[1,3],[1,4],[1,5],[1,6],[1,7],[1,8],[1,9],[1,10],[1,11],[1,12]],
            [[5,2],[5,3],[5,4],[5,5],[5,6],[5,7],[5,8],[5,9],[5,10],[5,11],[5,12]],
            [[1,2],[2,2],[3,2],[4,2],[5,2]],
            [[1,6],[2,6],[3,6],[4,6],[5,6]],
            [[1,8],[2,8],[3,8],[4,8],[5,8]],
            [[1,12],[2,12],[3,12],[4,12],[5,12]],
            [[3,6],[3,7],[3,8]],
        ];

        // 计算railway数组
        for (let r = 1; r <= ROWS; r++) {
            for (let c = 1; c <= COLS; c++) {
                const p = pointMap[`${c},${r}`];
                if (!p.onrailway) continue;
                railLines.forEach(line => {
                    const idx = line.findIndex(([lc,lr])=>lc===c&&lr===r);
                    if (idx===-1) return;
                    line.forEach(([lc,lr],i)=>{
                        if (i!==idx) { const k=`${lc},${lr}`; if(!p.railway.includes(k)) p.railway.push(k); }
                    });
                });
            }
        }

        // 去重road中的重复项
        for (let r = 1; r <= ROWS; r++) {
            for (let c = 1; c <= COLS; c++) {
                const p = pointMap[`${c},${r}`];
                // 移除自己（不应该有）
                const selfKey = `${c},${r}`;
                p.road = p.road.filter(k => k !== selfKey);
            }
        }

        // ==================== 绘制形状函数 ====================

        // 文字绘制（带方向）
        function drawTextOnPoint(text, x, y, row, offsetY, fontSize, color, align) {
            ctx.save();
            ctx.translate(x, y);
            if (row <= 6) ctx.rotate(Math.PI);
            ctx.font = `${fontSize}px "Microsoft YaHei", "SimHei", sans-serif`;
            ctx.fillStyle = color;
            ctx.textAlign = align || 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 0, offsetY);
            ctx.restore();
        }

        function drawDepot(p) {
            const w = 28, h = 20;
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(p.x - w/2, p.y - h/2, w, h);
            drawTextOnPoint('兵站', p.x, p.y, p.r, 0, 10, '#555');
        }

        function drawBase(p) {
            const w = 34, h = 26, r = 7;
            const color = p.team === 'red' ? '#c62828' : '#1565c0';
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(p.x - w/2 + r, p.y - h/2);
            ctx.lineTo(p.x + w/2 - r, p.y - h/2);
            ctx.quadraticCurveTo(p.x + w/2, p.y - h/2, p.x + w/2, p.y - h/2 + r);
            ctx.lineTo(p.x + w/2, p.y + h/2);
            ctx.lineTo(p.x - w/2, p.y + h/2);
            ctx.lineTo(p.x - w/2, p.y - h/2 + r);
            ctx.quadraticCurveTo(p.x - w/2, p.y - h/2, p.x - w/2 + r, p.y - h/2);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1.2;
            ctx.stroke();
            drawTextOnPoint('大本营', p.x, p.y, p.r, 0, 10, '#fff');
        }

        function drawFrontLine(p) {
            const s = 24;
            ctx.strokeStyle = '#e65100';
            ctx.lineWidth = 1.8;
            ctx.strokeRect(p.x - s/2, p.y - s/2, s, s);
            // 上排"前线"（朝向上方玩家=旋转180度）
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(Math.PI);
            ctx.font = '9px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = '#e65100';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('前线', 0, -6);
            ctx.restore();
            // 下排"前线"（朝向下方玩家=正常）
            ctx.font = '9px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = '#e65100';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('前线', p.x, p.y + 6);
        }

        function drawMountain(p) {
            const rad = 15;
            ctx.strokeStyle = '#6a1b9a';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(p.x, p.y, rad, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = 'rgba(106, 27, 154, 0.08)';
            ctx.fill();
            // 上排"山界"（朝向上方玩家）
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(Math.PI);
            ctx.font = '9px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = '#6a1b9a';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('山界', 0, -5);
            ctx.restore();
            // 下排"山界"（朝向下方玩家）
            ctx.font = '9px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = '#6a1b9a';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('山界', p.x, p.y + 5);
        }

        function drawCommandPost(p) {
            const rad = 15;
            ctx.strokeStyle = '#2e7d32';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(p.x, p.y, rad, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = 'rgba(46, 125, 50, 0.08)';
            ctx.fill();
            drawTextOnPoint('行营', p.x, p.y, p.r, 0, 10, '#2e7d32');
        }

        // ==================== 铁路绘制（黑白相间）====================
        function drawRailSegment(p1, p2) {
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const nx = dx / dist, ny = dy / dist;
            const segLen = 10; // 每段长度
            const nSegs = Math.floor(dist / segLen);

            for (let i = 0; i < nSegs; i++) {
                const x1 = p1.x + nx * (i * segLen);
                const y1 = p1.y + ny * (i * segLen);
                const x2 = p1.x + nx * ((i + 0.5) * segLen);
                const y2 = p1.y + ny * ((i + 0.5) * segLen);
                ctx.strokeStyle = i % 2 === 0 ? '#111' : '#f5e6d3';
                ctx.lineWidth = 4;
                ctx.lineCap = 'butt';
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            // 最后一段
            const lastStart = nSegs * segLen;
            if (lastStart < dist) {
                const isBlack = nSegs % 2 === 0;
                ctx.strokeStyle = isBlack ? '#111' : '#f5e6d3';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(p1.x + nx * lastStart, p1.y + ny * lastStart);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }
        }

        // ==================== 主绘制 ====================
        let selectedPoint = null;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景
            ctx.fillStyle = '#f5e6d3';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#8b6914';
            ctx.lineWidth = 2.5;
            ctx.strokeRect(14, 14, canvas.width - 28, canvas.height - 28);
            ctx.lineWidth = 1;
            ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

            // 收集所有需要绘制的线段
            const railSegs = [];
            const pathSegs = [];
            const drawnEdges = new Set();

            function edgeKey(c1,r1,c2,r2) {
                return c1<c2|| (c1===c2&&r1<r2) ? `${c1},${r1}-${c2},${r2}` : `${c2},${r2}-${c1},${r1}`;
            }

            // 铁路线段
            railLines.forEach(line => {
                for (let i = 0; i < line.length - 1; i++) {
                    const [c1,r1] = line[i], [c2,r2] = line[i+1];
                    const p1 = pos(c1,r1), p2 = pos(c2,r2);
                    railSegs.push([p1, p2]);
                    drawnEdges.add(edgeKey(c1,r1,c2,r2));
                }
            });

            // 公路线段（所有road连接）
            for (let r = 1; r <= ROWS; r++) {
                for (let c = 1; c <= COLS; c++) {
                    const p = pointMap[`${c},${r}`];
                    p.road.forEach(key => {
                        const [tc, tr] = key.split(',').map(Number);
                        const ek = edgeKey(c,r,tc,tr);
                        if (!drawnEdges.has(ek)) {
                            pathSegs.push([pos(c,r), pos(tc,tr)]);
                            drawnEdges.add(ek);
                        }
                    });
                }
            }

            // 绘制公路（细线，底层）
            ctx.strokeStyle = '#8b7355';
            ctx.lineWidth = 1;
            ctx.beginPath();
            pathSegs.forEach(([p1,p2]) => {
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
            });
            ctx.stroke();

            // 绘制铁路（黑白相间）
            railSegs.forEach(([p1,p2]) => drawRailSegment(p1, p2));

            // 绘制点位
            for (let r = 1; r <= ROWS; r++) {
                for (let c = 1; c <= COLS; c++) {
                    const p = pointMap[`${c},${r}`];
                    const pt = pos(c, r);
                    p.x = pt.x; p.y = pt.y;

                    switch(p.type) {
                        case 'Depot': drawDepot(p); break;
                        case 'Base': drawBase(p); break;
                        case 'FrontLine': drawFrontLine(p); break;
                        case 'Mountain': drawMountain(p); break;
                        case 'CommandPost': drawCommandPost(p); break;
                    }
                }
            }

            // 高亮选中点及其可移动位置
            if (selectedPoint) {
                const sp = selectedPoint;
                const center = pos(sp.c, sp.r);

                // 选中点高亮圈
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(center.x, center.y, 30, 0, Math.PI * 2);
                ctx.stroke();

                // 铁路可到达（橙色）
                sp.railway.forEach(key => {
                    const [tc, tr] = key.split(',').map(Number);
                    const tp = pos(tc, tr);
                    ctx.fillStyle = 'rgba(255, 152, 0, 0.35)';
                    ctx.beginPath();
                    ctx.arc(tp.x, tp.y, 22, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#ff9800';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });

                // 公路可到达（绿色）
                sp.road.forEach(key => {
                    const [tc, tr] = key.split(',').map(Number);
                    const tp = pos(tc, tr);
                    ctx.fillStyle = 'rgba(76, 175, 80, 0.35)';
                    ctx.beginPath();
                    ctx.arc(tp.x, tp.y, 22, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#4caf50';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
            }
        }

        // ==================== 交互 ====================
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            let best = null;
            let bestDist = 28;

            for (let r = 1; r <= ROWS; r++) {
                for (let c = 1; c <= COLS; c++) {
                    const p = pos(c, r);
                    const d = Math.sqrt((mx-p.x)**2 + (my-p.y)**2);
                    if (d < bestDist) {
                        bestDist = d;
                        best = pointMap[`${c},${r}`];
                    }
                }
            }

            selectedPoint = best;
            draw();
        });

        // 初始绘制
        draw();

        // 导出数据（供调试）
        window.junqiData = pointMap;

    })();
    </script>
</body>
</html>
